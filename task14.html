    <script>

i = 0

for (let i = 0; i < 3; i++){
    let number1 = Number(prompt("Enter a number: "))
    let number2 = Number(prompt("Enter another number: "))

    if (!isNaN(number1) && !isNaN(number2)){
        let sum = number1 + number2
        console.log(sum)
        break
    }
    else{
        console.log("invalid character entered")
    }       
}
