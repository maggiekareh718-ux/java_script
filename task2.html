<body>
    <div>
        <p>Task 2</p>
    </div>
    <script>
        // Prompt the user for a number either on a form input or the terminal. Depending on whether the number is even or odd, 
        // display  either “odd” or “even” to the user.If the number is a multiple of 4, print out “divisible by 4”.
        let num = prompt("Enter number")

        if (num % 4 == 0) {
            console.log("Divisible by 4")
        } else if (num % 2 == 0) {
            console.log("Even number")
        } else {
            console.log("Odd number")
        }

    </script>
</body>
