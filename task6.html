<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <div>
        <p>Task 6</p>
    </div>
    <script>
        // Write a program that lets the user input a password. Give them only 4 attempts to check the passwords entered against 
        // "admin@123". If the password is correct access is granted. After you show them a message , the account is blocked.

        let correct_password = "admin@123"
        let attempts = 4

        let data;
        for (let i = 0; i < attempts; i++) {
            let pass = prompt("Enter password");
            if (pass === null) break; // stop if a user clicks cancel
            if (pass === correct_password) {
                data = "Access granted";
                break
            } else {
                let remaining_tries = attempts - i - 1;
                if (remaining_tries === 0) {
                    data = 'Account blocked';
                } else {
                    data = `Try again you have ${remaining_tries} attempts remaining`
                    console.log(data) // log each attempt immediately
                }
            }
        }
        console.log(data) //logs final result "Access granted" or "Account blocked"

    </script>
</body>

</html>
