<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div>
        <p>Task 8</p>
    </div>
    <script>
        // Write a program that takes as input the speed of a car e.g 80. If the speed is less than 70, it should print “Ok”.
        // Otherwise, for every 5 km/s above the speed limit (70), it should give the driver one demerit point and print the 
        // total number of demerit points.
        // For example, if the speed is 80, it should print: “Points: 2”. If the driver gets more than 12 points, the function
        // should print: “License suspended”.
        let speed = Number(prompt("Enter car speed"))
        let speedlimit = 70

        let point;
        if (speed <= speedlimit) {
            point = 'Ok'
        } else {
            let demeritpoints = Math.floor((speed - speedlimit) / 5)
            if (demeritpoints > 12) {
                point = 'License suspended'
            } else {
                point = `demeritpoints: ${demeritpoints}`
            }
        }
    
        console.log(point)

    </script>
</body>

</html>
